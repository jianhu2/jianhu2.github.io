<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f6c343" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f6c343" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#30363d" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.4"/>
  <rect width="800" height="400" fill="url(#glow)"/>

  <!-- Terminal-style prompt -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
    <!-- Three dots (mac window) -->
    <circle cx="60" cy="60" r="7" fill="#ff5f56"/>
    <circle cx="84" cy="60" r="7" fill="#ffbd2e"/>
    <circle cx="108" cy="60" r="7" fill="#27c93f"/>

    <!-- Prompt line -->
    <text x="60" y="135" font-size="22" fill="#7d8590">FS0:\&gt; <tspan fill="#79c0ff">tftp</tspan> <tspan fill="#a5d6ff">45.61.151.109</tspan> <tspan fill="#ffa657">&lt;arch&gt;.efi</tspan></text>

    <!-- Series title -->
    <text x="60" y="220" font-size="48" font-weight="700" fill="#f0f6fc">Oracle Cloud · Netboot Rescue</text>

    <!-- Subtitle -->
    <text x="60" y="265" font-size="22" fill="#7ee787">$ EFI Shell → netboot.xyz → Rescue Mode → passwd</text>

    <!-- Bottom tags -->
    <g font-size="16" fill="#7d8590">
      <text x="60" y="340">▸ AMD / x86_64</text>
      <text x="240" y="340">▸ ARM / aarch64</text>
      <text x="420" y="340">▸ Ampere A1</text>
      <text x="580" y="340">▸ TFTP · UDP/69</text>
    </g>

    <!-- Blinking cursor (static visual) -->
    <rect x="62" y="370" width="14" height="20" fill="#7ee787" opacity="0.7"/>
  </g>

  <!-- Architecture badge top-right -->
  <g transform="translate(1020, 50)">
    <rect width="140" height="38" rx="19" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="70" y="25" font-family="ui-monospace, monospace" font-size="14" font-weight="600" fill="#79c0ff" text-anchor="middle">RESCUE MODE</text>
  </g>
</svg>
